version: '3.8'

services:
  sportscaster:
    build: .
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - CORS_ORIGINS=http://localhost:3001,http://localhost:5173
    volumes:
      - sportscaster-data:/app/server/data
    restart: unless-stopped

volumes:
  sportscaster-data:
